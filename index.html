<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Math Quest: Grade 7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="background-glow"></div>
  <main class="game-shell">
    <header class="game-header">
      <h1>Math Quest</h1>
      <p class="subtitle">A 7th Grade Adventure in Numbers</p>
    </header>

    <section class="panel controls" aria-label="Game Controls">
      <div class="control-group">
        <label for="topic-select">Topic</label>
        <select id="topic-select">
          <option value="mixed">Mixed Practice</option>
          <option value="integers">Integers</option>
          <option value="fractions">Fractions</option>
          <option value="decimals">Decimals</option>
          <option value="equations">One-Step Equations</option>
          <option value="percent">Percent</option>
        </select>
      </div>

      <div class="control-group">
        <label for="mode-select">Mode</label>
        <select id="mode-select">
          <option value="practice">Practice (No Timer)</option>
          <option value="timed">Timed (60s)</option>
        </select>
      </div>

      <button id="new-game-btn" class="btn btn-primary" type="button">Start New Game</button>
    </section>

    <section class="panel hud" aria-label="Scoreboard">
      <div class="stat">
        <span class="stat-label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="stat">
        <span class="stat-label">Streak</span>
        <strong id="streak">0</strong>
      </div>
      <div class="stat">
        <span class="stat-label">Question</span>
        <strong><span id="current-question">0</span>/<span id="total-questions">10</span></strong>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <strong id="timer">--</strong>
      </div>
    </section>

    <section class="panel question-panel" aria-live="polite">
      <p class="topic-chip" id="topic-chip">Mixed Practice</p>
      <h2 id="question-text">Press "Start New Game" to begin.</h2>

      <div class="answer-row">
        <input id="answer-input" type="text" inputmode="decimal" placeholder="Type your answer" autocomplete="off" disabled>
        <button id="submit-btn" class="btn btn-accent" type="button" disabled>Submit</button>
      </div>

      <p id="feedback" class="feedback">Ready when you are.</p>
    </section>

    <section class="panel summary" id="summary-panel" hidden>
      <h3>Round Complete</h3>
      <p id="summary-text"></p>
      <button id="play-again-btn" class="btn btn-primary" type="button">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
